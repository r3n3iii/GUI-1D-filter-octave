name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Octave and signal package
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y octave octave-signal

      - name: Run test suite
        run: octave --no-gui tests/run_all_tests.m
